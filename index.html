<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืนอุปกรณ์ ห้องแล็ป คณะพยาบาลศาสตร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        .hidden-section { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; padding: 20px; }
        }
    </style>
</head>
<body class="bg-blue-50 text-gray-800 font-sans min-h-screen">

    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-blue-600">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-blue-700">ระบบห้องแล็ป</h1>
                <p class="text-sm text-gray-500 mt-1">คณะพยาบาลศาสตร์ วิทยาลัยเซนต์หลุยส์</p>
            </div>
            <form id="loginForm" onsubmit="event.preventDefault(); login();" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">รหัสผู้ใช้งาน</label>
                    <input type="text" id="username" class="mt-1 w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500" required autofocus>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">รหัสผ่าน</label>
                    <input type="password" id="password" class="mt-1 w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500" required>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 font-medium transition">
                    เข้าสู่ระบบ
                </button>
            </form>
        </div>
    </div>

    <div id="mainSection" class="hidden-section max-w-5xl mx-auto mt-8 p-4">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-800">ระบบจัดการห้องแล็ปพยาบาล</h2>
                <p class="text-sm text-gray-600">ผู้ใช้งาน: <span id="displayStaffName" class="font-semibold text-blue-600"></span></p>
            </div>
            <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm font-medium border border-red-500 px-3 py-1 rounded">ออกจากระบบ</button>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="showTab('borrowTab')" id="btn-borrowTab" class="tab-btn flex-1 min-w-[150px] py-3 bg-blue-600 text-white rounded-lg font-medium shadow transition">📤 โหมดยืม</button>
            <button onclick="showTab('returnTab')" id="btn-returnTab" class="tab-btn flex-1 min-w-[150px] py-3 bg-white text-gray-600 hover:bg-gray-100 rounded-lg font-medium shadow transition">📥 โหมดคืน</button>
            <button onclick="showTab('addEquipTab')" id="btn-addEquipTab" class="tab-btn flex-1 min-w-[150px] py-3 bg-white text-gray-600 hover:bg-gray-100 rounded-lg font-medium shadow transition">🏷️ เพิ่มอุปกรณ์/ปริ้นบาร์โค้ด</button>
        </div>

        <div id="borrowTab" class="bg-white p-6 rounded-xl shadow-md tab-content">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📤 ทำรายการยืมอุปกรณ์</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">1. รหัสนักศึกษา (ผู้ยืม)</label>
                    <input type="text" id="borrowStudentId" placeholder="สแกนหรือพิมพ์รหัสนักศึกษา" class="mt-1 w-full px-4 py-3 border border-blue-300 rounded-md bg-blue-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">2. รหัสบาร์โค้ดอุปกรณ์</label>
                    <input type="text" id="borrowEquipId" placeholder="สแกนบาร์โค้ดอุปกรณ์ที่นี่..." class="mt-1 w-full px-4 py-3 border border-green-300 rounded-md bg-green-50 focus:bg-white focus:ring-2 focus:ring-green-500">
                    <p class="text-xs text-gray-500 mt-2">* เมื่อใช้เครื่องสแกน ระบบจะทำการบันทึกอัตโนมัติ</p>
                </div>
            </div>
            <button onclick="processBorrow()" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 font-bold text-lg shadow-md">
                ยืนยันการยืมอุปกรณ์
            </button>
        </div>

        <div id="returnTab" class="hidden-section bg-white p-6 rounded-xl shadow-md tab-content">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📥 ทำรายการคืนอุปกรณ์</h3>
            <div class="max-w-md mx-auto text-center">
                <label class="block text-sm font-medium text-gray-700 text-left mb-2">สแกนรหัสบาร์โค้ดอุปกรณ์ที่นำมาคืน</label>
                <input type="text" id="returnEquipId" placeholder="สแกนบาร์โค้ดที่นี่..." class="w-full px-4 py-4 border-2 border-green-400 rounded-lg text-center text-lg focus:ring-4 focus:ring-green-200 focus:outline-none">
                <button onclick="processReturn()" class="mt-4 w-full bg-green-500 text-white py-3 rounded-md hover:bg-green-600 font-bold text-lg shadow-md">
                    ยืนยันการคืนอุปกรณ์
                </button>
            </div>
        </div>

        <div id="addEquipTab" class="hidden-section bg-white p-6 rounded-xl shadow-md tab-content">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">🏷️ เพิ่มอุปกรณ์ใหม่และสร้างบาร์โค้ด</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">รหัสอุปกรณ์ (กำหนดเอง)</label>
                        <input type="text" id="newEquipId" placeholder="เช่น NS-2026-001" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" onkeyup="generateBarcodeLive()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">ชื่ออุปกรณ์ / ชุดหัตถการ</label>
                        <input type="text" id="newEquipName" placeholder="เช่น ชุดทำแผล (Dressing Set)" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" onkeyup="generateBarcodeLive()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">หมวดหมู่</label>
                        <select id="newEquipCategory" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="ทั่วไป">อุปกรณ์ทั่วไป</option>
                            <option value="ชุดเซ็ต">ชุดเซ็ตหัตถการ</option>
                            <option value="ครุภัณฑ์">ครุภัณฑ์ชิ้นใหญ่</option>
                        </select>
                    </div>
                    <button onclick="saveNewEquipment()" class="w-full bg-gray-800 text-white py-3 rounded-md hover:bg-gray-900 font-medium shadow-md">
                        💾 บันทึกลงฐานข้อมูล
                    </button>
                </div>

                <div class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                    <p class="text-sm text-gray-500 mb-4">ตัวอย่างบาร์โค้ดที่จะนำไปติดอุปกรณ์</p>
                    
                    <div id="print-area" class="bg-white p-4 rounded shadow-sm text-center">
                        <svg id="liveBarcode"></svg>
                        <p id="liveBarcodeLabel" class="text-xs text-gray-600 mt-1 font-semibold"></p>
                    </div>

                    <button onclick="window.print()" class="mt-6 bg-blue-500 text-white py-2 px-6 rounded-md hover:bg-blue-600 transition flex items-center gap-2">
                        🖨️ สั่งปริ้นบาร์โค้ดนี้
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLHyGxlX3dEqnMDwSpHcHdWZKtKTDJUG9QzA4v-QcKIxSow34-otfmjaOdSBjZtPqj/exec"; 

        let currentStaffId = "";

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden-section'));
            document.getElementById(tabId).classList.remove('hidden-section');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-600');
            });
            let activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('bg-white', 'text-gray-600');
            activeBtn.classList.add('bg-blue-600', 'text-white');

            if(tabId === 'borrowTab') document.getElementById('borrowStudentId').focus();
            if(tabId === 'returnTab') document.getElementById('returnEquipId').focus();
            if(tabId === 'addEquipTab') document.getElementById('newEquipId').focus();
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", username: user, password: pass })
                });
                const result = await response.json();

                if(result.success) {
                    currentStaffId = user;
                    document.getElementById('displayStaffName').innerText = result.name + " (" + result.role + ")";
                    document.getElementById('loginSection').classList.add('hidden-section');
                    document.getElementById('mainSection').classList.remove('hidden-section');
                    showTab('borrowTab');
                } else {
                    Swal.fire('เข้าสู่ระบบไม่สำเร็จ', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาดเครือข่าย', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาลองใหม่', 'error');
            }
            btn.innerText = "เข้าสู่ระบบ";
            btn.disabled = false;
        }

        function logout() {
            document.getElementById('loginSection').classList.remove('hidden-section');
            document.getElementById('mainSection').classList.add('hidden-section');
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            currentStaffId = "";
        }

        async function processBorrow() {
            const studentId = document.getElementById('borrowStudentId').value;
            const equipId = document.getElementById('borrowEquipId').value;

            if(!studentId || !equipId) {
                Swal.fire('แจ้งเตือน', 'กรุณาสแกนรหัสนักศึกษาและอุปกรณ์ให้ครบถ้วน', 'warning');
                return;
            }

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "borrow", 
                        studentId: studentId, 
                        equipmentId: equipId,
                        staffId: currentStaffId
                    })
                });
                const result = await response.json();

                if(result.success) {
                    Swal.fire('สำเร็จ!', 'บันทึกการยืมเรียบร้อยแล้ว', 'success');
                    document.getElementById('borrowEquipId').value = ""; 
                    document.getElementById('borrowEquipId').focus();
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', result.message || 'ไม่สามารถทำรายการได้', 'error');
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }

        async function processReturn() {
            const equipId = document.getElementById('returnEquipId').value;

            if(!equipId) {
                Swal.fire('แจ้งเตือน', 'กรุณาสแกนบาร์โค้ดอุปกรณ์ก่อนครับ', 'warning');
                return;
            }

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "return", equipmentId: equipId })
                });
                const result = await response.json();

                if(result.success) {
                    Swal.fire('สำเร็จ!', 'บันทึกการคืนอุปกรณ์เรียบร้อยแล้ว', 'success');
                    document.getElementById('returnEquipId').value = ""; 
                    document.getElementById('returnEquipId').focus();
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', result.message || 'ไม่สามารถทำรายการได้', 'error');
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }

        function generateBarcodeLive() {
            const id = document.getElementById('newEquipId').value;
            const name = document.getElementById('newEquipName').value;
            
            if(id) {
                JsBarcode("#liveBarcode", id, {
                    format: "CODE128",
                    width: 2,
                    height: 50,
                    displayValue: true,
                    fontSize: 16
                });
                document.getElementById('liveBarcodeLabel').innerText = name;
            } else {
                document.getElementById('liveBarcode').innerHTML = "";
                document.getElementById('liveBarcodeLabel').innerText = "";
            }
        }

        async function saveNewEquipment() {
            const id = document.getElementById('newEquipId').value;
            const name = document.getElementById('newEquipName').value;
            const category = document.getElementById('newEquipCategory').value;

            if(!id || !name) {
                Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสและชื่ออุปกรณ์ให้ครบถ้วน', 'warning');
                return;
            }

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "addEquipment", 
                        equipmentId: id,
                        name: name,
                        category: category
                    })
                });
                const result = await response.json();

                if(result.success) {
                    Swal.fire('สำเร็จ!', result.message, 'success');
                    document.getElementById('newEquipId').value = "";
                    document.getElementById('newEquipName').value = "";
                    generateBarcodeLive(); // เคลียร์บาร์โค้ดบนจอ
                    document.getElementById('newEquipId').focus();
                } else {
                    Swal.fire('ไม่สามารถเพิ่มได้', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }

        document.getElementById('borrowStudentId').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('borrowEquipId').focus(); 
            }
        });
        document.getElementById('borrowEquipId').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                processBorrow(); 
            }
        });
        document.getElementById('returnEquipId').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                processReturn(); 
            }
        });

    </script>
</body>

</html>
